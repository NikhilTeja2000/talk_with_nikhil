            - heading "Company Overview" [level=2] [ref=e88]
            - paragraph [ref=e90]: Intuit is the global financial technology platform that powers prosperity for the people and communities we serve. With approximately 100 million customers worldwide using products such as TurboTax, Credit Karma, QuickBooks, and Mailchimp, we believe that everyone should have the opportunity to prosper. We never stop working to find new, innovative ways to make that possible.
          - generic [ref=e91]:
            - heading "Job Overview" [level=2] [ref=e92]
            - paragraph [ref=e93]:
              - generic [ref=e94]: The Tech 4 Intuit (T4I) People and Places Technology team delivers the technical solutions that support the entire lifecycle (Hire to Retire) for our global employees. We are seeking a highly skilled Staff Software Engineer with a strong background in Java, AWS, Kafka etc. preferably with experience in the enterprise engineering domains and working experience on building platforms. In this role, you will develop high-quality, scalable software that aligns with Intuit's architectural best practices and core values, delivering best-in-class solutions that directly impact every Intuit employee.
            - paragraph [ref=e95]:
              - strong [ref=e96]: Responsibilities
            - paragraph [ref=e97]
            - list [ref=e98]:
              - listitem [ref=e99]:
                - text: 
                - paragraph [ref=e100]: Design, build, and maintain scalable web applications, backend services, and data integration pipelines.
              - listitem [ref=e101]:
                - text: 
                - paragraph [ref=e102]: Drive the end-to-end technical execution of projects and features, ensuring high standards for quality and operational excellence.
              - listitem [ref=e103]:
                - text: 
                - paragraph [ref=e104]: Shape architectural decisions, Participate in design reviews and ensure sustainable code for scale and/or rapid iteration.
              - listitem [ref=e105]:
                - text: 
                - paragraph [ref=e106]: Lead the technical design of complex features, making sound architectural decisions and creating clear, effective documentation
              - listitem [ref=e107]:
                - text: 
                - paragraph [ref=e108]: Set solid technical examples and patterns and drive best practices adoption including testing and observability
              - listitem [ref=e109]:
                - text: 
                - paragraph [ref=e110]: Solves complex, ambiguous technical bugs that may require system understanding outside their team's ownership
              - listitem [ref=e111]:
                - text: 
                - paragraph [ref=e112]: Provide reliable project estimates, factoring in technical risks and team capacity, while strategically balancing trade-offs between rapid delivery and long-term system health
              - listitem [ref=e113]:
                - text: 
                - paragraph [ref=e114]: Eliminates systemic roadblocks through cross-functional influence and shape execution practices to maintain quality standards through every release, monitoring after it goes live.
              - listitem [ref=e115]:
                - text: 
                - paragraph [ref=e116]: Takes full responsibility for successful delivery of major features or projects, including managing risks and keeping stakeholders informed.
              - listitem [ref=e117]:
                - text: 
                - paragraph [ref=e118]: Resolve technical constraints between individual and/or cross-functional partners by leveraging values, principles, customer problems and technology patterns/best practices.
              - listitem [ref=e119]:
                - text: 
                - paragraph [ref=e120]: Demonstrate a strong aptitude for learning and applying new languages, frameworks, and technologies to solve emerging challenges
              - listitem [ref=e121]:
                - text: 
                - paragraph [ref=e122]: Identify and explore opportunities to apply AI/ML, including Generative AI, to enhance application features and streamline workflows
              - listitem [ref=e123]:
                - text: 
                - paragraph [ref=e124]: Lead technology/design evaluation and adoption, considering long-term implications and integrating AI/GenAI tools to enhance team capabilities
            - paragraph [ref=e125]:
              - strong [ref=e126]: Qualifications
            - paragraph [ref=e127]
            - list [ref=e128]:
              - listitem [ref=e129]:
                - text: 
                - paragraph [ref=e130]: 5+ years of experience designing and developing web applications, backend services, and data pipelines.
              - listitem [ref=e131]:
                - text: 
                - paragraph [ref=e132]: 3+ years of experience with server-side technologies.
              - listitem [ref=e133]:
                - text: 
                - paragraph [ref=e134]: BS/MS in computer science or equivalent work experience.
              - listitem [ref=e135]:
                - text: 
                - paragraph [ref=e136]: Strong experience developing Java/Java EE services and applications, preferably with Spring Boot.
              - listitem [ref=e137]:
                - text: 
                - paragraph [ref=e138]: Strong knowledge of API development (REST/GraphQL), including pagination, throttling, caching, API security, and routing.
              - listitem [ref=e139]:
                - text: 
                - paragraph [ref=e140]: Expertise in cloud technologies (AWS preferred) and architecting highly scalable, resilient systems.
              - listitem [ref=e141]:
                - text: 
                - paragraph [ref=e142]: Working knowledge of streaming frameworks and event-driven architecture.Experience on Apache Flink is good to have.
              - listitem [ref=e143]:
                - text: 
                - paragraph [ref=e144]: Experience with observability tools (e.g., Splunk, Wavefront) for improving application logging, creating dashboards and visualizations.
              - listitem [ref=e145]:
                - text: 
                - paragraph [ref=e146]: Excellent communication skills, with the ability to explain complex technical concepts to diverse audiences.
              - listitem [ref=e147]:
                - text: 
                - paragraph [ref=e148]: Experience with unit testing, Test Driven Development( TDD), and test automation tools (e.g., Karate).
              - listitem [ref=e149]:
                - text: 
                - paragraph [ref=e150]: Solid knowledge of algorithms, design patterns, and clean architecture is necessary
              - listitem [ref=e151]:
                - text: 
                - paragraph [ref=e152]: Experience with SQL/NoSQL databases, data lakes, Kafka, and schema modeling.
              - listitem [ref=e153]:
                - text: 
                - paragraph [ref=e154]: Experience with Agile development methodologies such as Scrum and XP.
              - listitem [ref=e155]:
                - text: 
                - paragraph [ref=e156]: Experience in enterprise engineering domains (e.g., Finance, HR, Places) is a plus.
